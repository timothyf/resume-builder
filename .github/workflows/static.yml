name: Build and deploy resume

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install visual test dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PDF inspection dependencies
        run: |
          pip install -r requirements-visual.txt
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Prepare example resume configuration
        run: |
          cp data/active_resume.yml.example data/active_resume.yml
          cp data/resume_support.yml.example data/resume_support.yml

      - name: Set deployment timestamp
        run: echo "RESUME_DEPLOYED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Validate supported resumes
        run: ./validate_supported_resumes.bash

      - name: Test supported resume build matrix
        run: RUN_INTEGRATION=1 bundle exec rspec spec/integration

      - name: Test local YAML editor
        run: npm run editor:test

      - name: Test visual regression
        run: RUN_VISUAL=1 bundle exec rspec spec/visual/visual_regression_spec.rb

      - name: Upload visual regression diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diagnostics
          path: |
            tmp/visual-regression/current
            tmp/pdfs/visual-regression
          if-no-files-found: ignore

      - name: Build resume
        run: ./build_resume.bash --resume-user johndoe --resume-name resume_sample

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/johndoe/resume_sample

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
